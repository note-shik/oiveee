<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oivee</title>

<style>
:root {
  --bg: #050505;
  --text: #eaeaea;
  --muted: #888;
  --border: #333;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #111, var(--bg));
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* Layout */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 24px;
  max-width: 800px;
  margin: auto;
}

/* Typewriter */
.line {
  font-size: clamp(18px, 4vw, 28px);
  margin: 6px 0;
  white-space: nowrap;
  overflow: hidden;
  border-right: 2px solid #fff;
  display: inline-block;
}

.glow {
  text-shadow: 0 0 8px rgba(255,255,255,0.4);
}

/* Subtext */
.subtext {
  margin-top: 24px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.5;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.8s ease;
}

/* CTA */
.btn {
  margin-top: 28px;
  display: inline-block;
  padding: 14px 22px;
  font-size: 15px;
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: all 0.25s ease;
  opacity: 0;
  transform: translateY(10px);
}

.btn:hover {
  background: white;
  color: black;
}

/* Footer */
.footer {
  position: fixed;
  bottom: 15px;
  left: 20px;
  font-size: 12px;
  color: #666;
}

/* Mobile improvements */
@media (max-width: 480px) {
  .container {
    padding: 20px;
  }

  .btn {
    width: 100%;
    text-align: center;
  }

  .footer {
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
}
</style>
</head>

<body>

<div class="container">
  <div id="line1" class="line glow"></div><br>
  <div id="line2" class="line"></div><br>
  <div id="line3" class="line"></div>

  <div id="subtext" class="subtext">
    Oivee builds websites designed to bring you more customers — not just look good.
  </div>

  <a id="cta" class="btn" href="https://wa.me/919064982248?text=Hey%20I%20came%20from%20oivee.com" target="_blank">
    Get Free Audit →
  </a>
</div>

<div class="footer">
  oivee.com / @oiveebyshik
</div>

<script>
const lines = [
  "Initializing Oivee...",
  "Analyzing your business...",
  "Building systems that convert."
];

let lineIndex = 0;
let charIndex = 0;

function typeLine() {
  if (lineIndex < lines.length) {
    const currentLine = document.getElementById("line" + (lineIndex + 1));

    if (charIndex < lines[lineIndex].length) {
      currentLine.innerHTML += lines[lineIndex].charAt(charIndex);
      charIndex++;
      setTimeout(typeLine, 35);
    } else {
      lineIndex++;
      charIndex = 0;
      setTimeout(typeLine, 400);
    }
  } else {
    revealElements();
  }
}

function revealElements() {
  document.getElementById("subtext").style.opacity = 1;
  document.getElementById("subtext").style.transform = "translateY(0)";

  setTimeout(() => {
    document.getElementById("cta").style.opacity = 1;
    document.getElementById("cta").style.transform = "translateY(0)";
  }, 300);
}

typeLine();
</script>

</body>
</html>
